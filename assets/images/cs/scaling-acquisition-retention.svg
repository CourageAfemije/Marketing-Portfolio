  <line x1="0" y1="416" x2="580" y2="416" stroke="#21262D" stroke-width="1"/>
  <circle cx="32" cy="440" r="6" fill="#F59E0B"/>
  <text x="46" y="445" fill="#8B949E" font-size="12" font-family="system-ui,sans-serif">Heyfood · Q2–Q3 Scale &amp; Retention</text>
