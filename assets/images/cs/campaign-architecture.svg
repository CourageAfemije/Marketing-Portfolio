<svg width="580" height="464" viewBox="0 0 580 464" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0D1117"/><stop offset="100%" stop-color="#0F1A10"/></linearGradient>
    <linearGradient id="tier1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1E2C10"/><stop offset="100%" stop-color="#1A2810"/></linearGradient>
    <linearGradient id="tier2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1A2810"/><stop offset="100%" stop-color="#162210"/></linearGradient>
    <linearGradient id="tier3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#152010"/><stop offset="100%" stop-color="#111C0E"/></linearGradient>
  </defs>

  <rect width="580" height="464" fill="url(#bg)"/>

  <!-- Eyebrow -->
  <text x="32" y="44" fill="#8B949E" font-size="10" font-family="system-ui,sans-serif" letter-spacing="1.5">PHASE 02 — 3-TIER CAMPAIGN FUNNEL</text>

  <!-- Funnel shape visual (trapezoids stacked) -->
  <!-- Tier 1: Acquisition (top, widest) -->
  <polygon points="40,72 540,72 500,168 80,168" fill="url(#tier1)"/>
  <polygon points="40,72 540,72 500,168 80,168" fill="none" stroke="#A3E635" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Tier 1 label -->
  <text x="290" y="108" text-anchor="middle" fill="#A3E635" font-size="14" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="2">ACQUISITION</text>
  <text x="290" y="128" text-anchor="middle" fill="#8B949E" font-size="12" font-family="system-ui,sans-serif">Cold Lookalikes · Broad Interest Targeting</text>
  <text x="290" y="148" text-anchor="middle" fill="#F0F6FC" font-size="11" font-family="system-ui,sans-serif">Budget: 60% · Format: Video / Image</text>

  <!-- Tier 2: Consideration (middle) -->
  <polygon points="80,176 500,176 468,256 112,256" fill="url(#tier2)"/>
  <polygon points="80,176 500,176 468,256 112,256" fill="none" stroke="#84CC16" stroke-width="2" stroke-opacity="0.65"/>

  <text x="290" y="207" text-anchor="middle" fill="#84CC16" font-size="14" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="2">CONSIDERATION</text>
  <text x="290" y="225" text-anchor="middle" fill="#8B949E" font-size="12" font-family="system-ui,sans-serif">Video Viewers · Website Visitors</text>
  <text x="290" y="244" text-anchor="middle" fill="#F0F6FC" font-size="11" font-family="system-ui,sans-serif">Budget: 25% · Format: Carousel / UGC</text>

  <!-- Tier 3: Retention (bottom, narrowest) -->
  <polygon points="112,264 468,264 436,344 144,344" fill="url(#tier3)"/>
  <polygon points="112,264 468,264 436,344 144,344" fill="none" stroke="#65A30D" stroke-width="2" stroke-opacity="0.6"/>

  <text x="290" y="297" text-anchor="middle" fill="#65A30D" font-size="14" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="2">RETENTION</text>
  <text x="290" y="315" text-anchor="middle" fill="#8B949E" font-size="12" font-family="system-ui,sans-serif">Past Buyers · Inactive Users</text>
  <text x="290" y="333" text-anchor="middle" fill="#F0F6FC" font-size="11" font-family="system-ui,sans-serif">Budget: 15% · Format: Offer / Reminder</text>

  <!-- Arrow pointing down -->
  <path d="M280 352 L300 352 L290 368 Z" fill="#65A30D" opacity="0.5"/>

  <!-- Result chip at bottom -->
  <rect x="130" y="374" width="320" height="32" rx="8" fill="#161B22"/>
  <rect x="130" y="374" width="320" height="32" rx="8" stroke="#A3E635" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="290" y="395" text-anchor="middle" fill="#8B949E" font-size="11" font-family="system-ui,sans-serif">Stopped budget leakage between funnel tiers →</text>

  <!-- Footer -->
  <rect x="0" y="416" width="580" height="48" fill="#161B22"/>
  <line x1="0" y1="416" x2="580" y2="416" stroke="#21262D" stroke-width="1"/>
  <circle cx="32" cy="440" r="6" fill="#84CC16"/>
  <text x="46" y="445" fill="#8B949E" font-size="12" font-family="system-ui,sans-serif">Pricepally · Phase 02 — Rebuilding the Campaign Architecture</text>
</svg>
